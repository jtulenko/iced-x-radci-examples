<html>
  <head>
    <meta charset="utf-8">
    <title>ICE-D & RAD-CI Examples - HOME</title>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <link type="text/css" rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="https://storage.googleapis.com/iced-x-radci-examples/images/ICED_RADCI_logo.png" type="image/png">
    <script type="text/javascript" src="https://cdn.bokeh.org/bokeh/release/bokeh-3.7.3.min.js"></script>
      <script type="text/javascript">
          Bokeh.set_log_level("info");
      </script>
  </head>
<body>
  <table width = 100%, border = "1", class="table_alt">
    <tr>
      <td align="left" width="13.33333%"><a href='/'><img alt="icedradcilogo" src="https://storage.googleapis.com/iced-x-radci-examples/images/ICED_RADCI_logo.png" style="border-width:10px;border-style:hidden;margin:10px;width:150px" /></a></td>
      <td align="left" width="32%">
        <h1>ICE-D & RAD-CI <br> EXAMPLES PAGE</h1>
      </td>
      <td align="left" width="24.666667%">
        <div style="font-size: 15px;">
          Informal Cosmogenic-Nuclide
          <br> Exposure Age Database Project
          <br>
          <br> Radiocarbon CyberInfrastructure Project
        </div>
      </td>
      <td align="right" width="30%">
      <a href="https://www.nsf.gov/funding/opportunities/cssi-cyberinfrastructure-sustained-scientific-innovation" target="_blank"><img alt="CSSIlogo" src="https://storage.googleapis.com/iced-x-radci-examples/images/CSSI_logo.png" style="width: 100px"></a>
      </td>
    </tr>
  </table>

  <table width = 100%, border = "1">
    <tr>
      <p align="left"><a href="/">HOME</a> | <a href="https://www.ice-d.org">ICE-D HOME PAGE</a> | <a href= "https://www.rad-ci.org">RAD-CI HOME PAGE</a></p>
    </tr>
  </table>

  <table width = 100%, border="1">
    <td>
    <h2>ASKICE-D</h2>
    <p> Choose from a select list of attributes to query the ICE-D Project database</p>
    </td>
  </table>
  <table width=100%>
    <tr><td><h3>Sample Attributes</h3></td></tr>
    <tr><td align=center>
    <form method="post">
      <!--<tr> -->
        <td width="25%" style="border-right:1px solid #000;">
          <label><input type="checkbox" id="samplename" name="SAMPLENAME" value="base_sample.name"> Sample Name</label><br>
          <label><input type="checkbox" id="samplethick" name="SAMPLETHICK" value="base_sample.thick_cm"> Sample Thickness (cm)</label>
        </td>

        <td width="25%" style="border-right:1px solid #000;">
          <label><input type="checkbox" id="samplelat" name="SAMPLELAT" value="base_sample.lat_DD"> Sample Latitude (DD)</label><br>
          <label><input type="checkbox" id="sampledensity" name="SAMPLEDENSITY" value="base_sample.density"> Sample Density (g/cm3)</label>
        </td>

        <td width="25%" style="border-right:1px solid #000;">
          <label><input type="checkbox" id="samplelon" name="SAMPLELON" value="base_sample.lon_DD"> Sample Longitude (DD)</label><br>
          <label><input type="checkbox" id="sampleshield" name="SAMPLESHIELD" value="base_sample.shielding"> Sample Shielding</label>
        </td>

        <td width="25%">
          <label><input type="checkbox" id="sampleelvm" name="SAMPLEELVM" value="base_sample.elv_m"> Sample Elevation (m)</label><br>
          <label><input type="checkbox" id="samplewhat" name="SAMPLEWHAT" value="base_sample.what"> Sample Type (what)</label>
        </td>
      <!--</tr>-->
    </form>
    <form method="post">
      <label for="rsl_site">RSL Site</label>
      <select name="rsl_site">
        <option value="" disabled selected>----</option>
        {% for rsl_site in rsl_site_list %}
          <option value="{{ rsl_site }}">{{ rsl_site }}</option><br>
        {% endfor %}
      </select><br><br>

      <button type="submit" name="action" value="rsl_plot">Generate Plot</button>
    </form>
    <form method="get" action="/radciexamples" style="margin-top: 1em;">
      <input type="submit" value="Reset">
    </form>
  
    </td></tr>
        </table>
  </table>

<br>
<br>
</body>
</html>
